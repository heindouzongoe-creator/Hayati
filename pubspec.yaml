name: immofaso
description: Plateforme de gestion de location immobilière - Burkina Faso
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  go_router: ^17.2.1
  shared_preferences: ^2.2.2
  http: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.7
  intl: ^0.20.2
  shimmer: ^3.0.0
  url_launcher: ^6.2.2
  font_awesome_flutter: ^11.0.0
  carousel_slider: ^5.1.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
