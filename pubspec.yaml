name: herresso
description: Plateforme de gestion de location immobilière - Burkina Faso
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  go_router: ^14.0.0
  shared_preferences: ^2.2.2
  http: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.2
  font_awesome_flutter: ^10.7.0
  carousel_slider: ^5.1.2
  google_fonts: ^6.2.1
  firebase_messaging: ^15.1.6
  firebase_core: ^3.8.1
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/